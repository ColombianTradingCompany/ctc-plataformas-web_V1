<style>
  :root{
    --paper:#fbfbf8;
    --grid:#e6e2f0;
    --grid-bold:#d7d0e6;
    --ink:#1c1430;
    --ink-soft:#6a627a;
    --line:#ddd7e6;
    --line-strong:#c5bdd4;
    --field:#ffffff;
    --blue:#3c0c84;        /* brand purple (primary accent) */
    --blue-deep:#290858;
    --blue-wash:#efe9fb;
    --lavender:#ccb4fc;
    --ctc-red:#cc0c24;
    --ctc-blue:#0c3c84;
    --ctc-yellow:#fccc0c;
    --shadow:41,8,88;
    --r:10px;
    --mono:'Space Mono',ui-monospace,Menlo,monospace;
    --sans:'Inter',system-ui,sans-serif;
    --disp:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px),
      linear-gradient(var(--grid-bold) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid-bold) 1px,transparent 1px);
    background-size:24px 24px,24px 24px,120px 120px,120px 120px;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .wrap{max-width:1140px;margin:0 auto;padding:28px 22px 64px;}

  /* Header */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;
    padding-bottom:18px;margin-bottom:26px;border-bottom:1.5px solid var(--line-strong);}
  .brand{display:flex;align-items:center;gap:14px;}
  .mark{width:42px;height:42px;flex:0 0 42px;border:2px solid var(--ink);border-radius:8px;
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:3px;padding:5px;background:var(--paper);}
  .mark i{background:var(--blue);border-radius:1px;}
  .mark i:nth-child(2){background:var(--ctc-red);}
  .mark i:nth-child(4){background:var(--ctc-yellow);}
  .mark i:nth-child(6){background:var(--ctc-blue);}
  .mark i:nth-child(8){background:var(--lavender);}
  .mark i:nth-child(5){background:transparent;}
  h1{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:-.02em;margin:0;line-height:1.05;max-width:22ch;}
  .tag{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-top:5px;}
  .coord{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.08em;text-align:right;}

  /* Layout */
  .grid{display:grid;grid-template-columns:1fr 420px;gap:34px;align-items:start;}
  @media(max-width:880px){.grid{grid-template-columns:1fr;gap:26px;}}

  /* Tabs */
  .tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--field);border:1.5px solid var(--line-strong);
    border-radius:12px;padding:6px;box-shadow:0 1px 0 rgba(var(--shadow),.04);}
  .tab{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;font-family:var(--disp);
    font-weight:600;font-size:14px;letter-spacing:-.01em;color:var(--ink-soft);background:transparent;
    border:none;border-radius:8px;padding:11px 8px;cursor:pointer;transition:background .14s,color .14s;}
  .tab .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;transition:transform .14s;}
  .tab[data-tab="content"] .dot{background:var(--ctc-red);}
  .tab[data-tab="style"]   .dot{background:var(--ctc-yellow);}
  .tab[data-tab="export"]  .dot{background:var(--ctc-blue);}
  .tab .n{font-family:var(--mono);font-size:11px;opacity:.6;}
  .tab:hover{color:var(--ink);}
  .tab[aria-selected="true"]{background:var(--blue);color:#fff;box-shadow:0 2px 0 var(--blue-deep);}
  .tab[aria-selected="true"] .n{opacity:.85;}
  .tab[aria-selected="true"] .dot{transform:scale(1.25);box-shadow:0 0 0 2px rgba(255,255,255,.5);}
  @media(max-width:520px){.tab{font-size:0;gap:6px;padding:12px 6px;}.tab .n{font-size:13px;}.tab .dot{width:11px;height:11px;}}

  /* Panels */
  .panel{background:var(--field);border:1.5px solid var(--line-strong);border-radius:var(--r);
    box-shadow:0 1px 0 rgba(var(--shadow),.04);}
  .panel[hidden]{display:none;}
  .phead{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1.5px solid var(--line);}
  .phead .num{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:var(--ink);
    width:22px;height:22px;border-radius:5px;display:grid;place-items:center;flex:0 0 22px;}
  .phead h2{font-family:var(--disp);font-size:15px;font-weight:600;letter-spacing:-.01em;margin:0;}
  .pbody{padding:18px;}

  label.fl{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:7px;}
  .field{display:block;width:100%;font-family:var(--sans);font-size:14px;color:var(--ink);
    background:var(--paper);border:1.5px solid var(--line-strong);border-radius:8px;padding:10px 12px;outline:none;}
  textarea.field{resize:vertical;min-height:74px;line-height:1.45;}
  .field:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-wash);background:#fff;}
  .row{display:flex;gap:12px;}
  .row > *{flex:1;min-width:0;}
  .grp{margin-bottom:16px;}
  .grp:last-child{margin-bottom:0;}

  /* Segmented control */
  .seg{display:flex;flex-wrap:wrap;gap:6px;background:var(--paper);border:1.5px solid var(--line-strong);
    border-radius:9px;padding:5px;}
  .seg button{flex:1 1 auto;min-width:62px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;
    border:none;background:transparent;color:var(--ink-soft);padding:8px 6px;border-radius:6px;cursor:pointer;
    transition:background .12s,color .12s;text-transform:uppercase;}
  .seg button:hover{color:var(--ink);}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff;}
  .seg.blue button[aria-pressed="true"]{background:var(--blue);}

  /* Color rows */
  .colorrow{display:flex;align-items:center;gap:10px;}
  .swatch{position:relative;width:42px;height:42px;flex:0 0 42px;border-radius:8px;border:1.5px solid var(--line-strong);
    overflow:hidden;cursor:pointer;background-image:
      linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);
    background-size:12px 12px;background-position:0 0,0 6px,6px -6px,-6px 0;}
  .swatch input[type=color]{position:absolute;inset:-6px;width:140%;height:140%;border:none;padding:0;cursor:pointer;background:transparent;}
  .swatch .sw-fill{position:absolute;inset:0;pointer-events:none;}
  .hex{font-family:var(--mono);font-size:13px;text-transform:uppercase;}

  /* Toggle */
  .toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;}
  .toggle .tg{width:42px;height:24px;border-radius:99px;background:var(--line-strong);position:relative;transition:background .15s;flex:0 0 42px;}
  .toggle .tg::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.25);}
  .toggle input{position:absolute;opacity:0;width:0;height:0;}
  .toggle input:checked + .tg{background:var(--blue);}
  .toggle input:checked + .tg::after{transform:translateX(18px);}
  .toggle input:focus-visible + .tg{box-shadow:0 0 0 3px var(--blue-wash);}
  .tglab{font-family:var(--sans);font-size:13.5px;font-weight:500;}
  .tgsub{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);letter-spacing:.04em;}

  /* Slider */
  .slider{display:flex;align-items:center;gap:12px;}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:99px;
    background:var(--line-strong);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--blue);cursor:pointer;border:3px solid #fff;box-shadow:0 0 0 1.5px var(--blue);}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer;border:3px solid #fff;box-shadow:0 0 0 1.5px var(--blue);}
  input[type=range]:focus-visible{box-shadow:0 0 0 3px var(--blue-wash);}
  .sval{font-family:var(--mono);font-size:12px;min-width:52px;text-align:right;color:var(--ink);}

  /* Presets */
  .presets{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  @media(max-width:880px){.presets{grid-template-columns:repeat(6,1fr);}}
  .preset{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--line-strong);cursor:pointer;padding:0;
    position:relative;overflow:hidden;transition:transform .1s,border-color .1s;}
  .preset:hover{transform:translateY(-1px);border-color:var(--blue);}
  .preset[aria-pressed="true"]{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-wash);}
  .preset svg{width:100%;height:100%;display:block;}

  /* Buttons */
  .btn{font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.01em;border-radius:9px;
    padding:13px 16px;cursor:pointer;border:1.5px solid transparent;transition:filter .12s,background .12s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
  .btn.primary{background:var(--blue);color:#fff;width:100%;box-shadow:0 2px 0 var(--blue-deep);}
  .btn.primary:hover{filter:brightness(1.06);}
  .btn.primary:active{transform:translateY(1px);box-shadow:0 1px 0 var(--blue-deep);}
  .btn.ghost{background:#fff;color:var(--ink);border-color:var(--line-strong);}
  .btn.ghost:hover{border-color:var(--ink);}
  .btnrow{display:flex;gap:10px;margin-top:14px;}
  .btnrow .btn{flex:1;}

  /* Preview / plate */
  .stage{position:sticky;top:22px;}
  @media(max-width:880px){.stage{position:static;}}
  .plate{background:#fff;border:1.5px solid var(--line-strong);border-radius:var(--r);padding:30px;
    box-shadow:0 18px 40px -22px rgba(var(--shadow),.4);position:relative;}
  .plate::before,.plate::after{content:"";position:absolute;width:16px;height:16px;border:1.5px solid var(--line-strong);}
  .plate::before{top:12px;left:12px;border-right:none;border-bottom:none;}
  .plate::after{bottom:12px;right:12px;border-left:none;border-top:none;}
  .regtop{position:absolute;top:12px;right:12px;width:16px;height:16px;border:1.5px solid var(--line-strong);border-left:none;border-bottom:none;}
  .regbot{position:absolute;bottom:12px;left:12px;width:16px;height:16px;border:1.5px solid var(--line-strong);border-right:none;border-top:none;}
  .canvas-hold{display:grid;place-items:center;min-height:300px;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:14px 14px;border-radius:6px;padding:14px;}
  #preview{max-width:100%;height:auto;border-radius:4px;image-rendering:auto;display:block;}
  .empty{font-family:var(--mono);font-size:12px;color:var(--ink-soft);text-align:center;letter-spacing:.04em;max-width:220px;}
  .readout{margin-top:16px;display:flex;flex-wrap:wrap;gap:6px 18px;font-family:var(--mono);font-size:11px;
    color:var(--ink-soft);letter-spacing:.05em;justify-content:center;border-top:1px dashed var(--line-strong);padding-top:14px;}
  .readout b{color:var(--ink);font-weight:700;}
  .err{font-family:var(--mono);font-size:12px;color:#c0392b;text-align:center;line-height:1.5;}

  .hint{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);letter-spacing:.03em;margin-top:8px;line-height:1.5;}
  .logo-ecc-warn{font-family:var(--mono);font-size:11px;line-height:1.55;margin-top:10px;padding:10px 12px;
    border-radius:8px;border:1.5px solid #e09a00;background:#fffbec;color:#7a5500;display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;}
  .warn-icon{font-size:14px;flex:0 0 auto;}
  .logo-ecc-warn[hidden]{display:none;}

  /* Frame picker */
  .frame-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .frame-opt{aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line-strong);cursor:pointer;
    padding:0;background:var(--paper);position:relative;transition:border-color .12s,transform .1s;overflow:hidden;}
  .frame-opt:hover{border-color:var(--blue);transform:translateY(-1px);}
  .frame-opt[aria-pressed="true"]{border-color:var(--blue);box-shadow:0 0 0 2.5px var(--blue-wash);}
  .frame-opt svg{width:100%;height:100%;display:block;}
  .frame-opt .flabel{position:absolute;bottom:3px;left:0;right:0;text-align:center;
    font-family:var(--mono);font-size:7px;letter-spacing:.02em;color:var(--ink-soft);pointer-events:none;}
  .frame-opt[aria-pressed="true"] .flabel{color:var(--blue);}

  .filebtn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;
    border:1.5px dashed var(--line-strong);border-radius:8px;padding:10px 12px;cursor:pointer;color:var(--ink-soft);width:100%;justify-content:center;text-transform:uppercase;}
  .filebtn:hover{border-color:var(--blue);color:var(--blue);}
  .logorow{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .logothumb{width:34px;height:34px;border-radius:6px;border:1.5px solid var(--line-strong);object-fit:contain;background:#fff;flex:0 0 34px;}
  .linkbtn{background:none;border:none;color:var(--blue);font-family:var(--mono);font-size:11px;cursor:pointer;text-decoration:underline;padding:0;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    font-family:var(--mono);font-size:12px;letter-spacing:.04em;padding:11px 18px;border-radius:8px;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <div>
        <h1>Colombian Trading Company</h1>
        <div class="tag">QR code generator</div>
      </div>
    </div>
    <div class="coord" id="clock">CTC&nbsp;/&nbsp;QR</div>
  </header>

  <div class="grid">
    <!-- LEFT: controls -->
    <div>
      <div class="tabs" role="tablist" aria-label="QR settings">
        <button class="tab" role="tab" id="tab-content" data-tab="content" aria-selected="true" aria-controls="panel-content"><span class="dot"></span><span class="n">1</span> Content</button>
        <button class="tab" role="tab" id="tab-style" data-tab="style" aria-selected="false" aria-controls="panel-style" tabindex="-1"><span class="dot"></span><span class="n">2</span> Style</button>
        <button class="tab" role="tab" id="tab-export" data-tab="export" aria-selected="false" aria-controls="panel-export" tabindex="-1"><span class="dot"></span><span class="n">3</span> Export</button>
      </div>

      <!-- 1. CONTENT -->
      <section class="panel" id="panel-content" role="tabpanel" aria-labelledby="tab-content" data-tabpanel="content">
        <div class="pbody">
          <div class="grp">
            <div class="seg blue" id="typeSeg" role="group" aria-label="Content type">
              <button data-type="text" aria-pressed="true">Link / Text</button>
              <button data-type="wifi" aria-pressed="false">Wi-Fi</button>
              <button data-type="email" aria-pressed="false">Email</button>
              <button data-type="phone" aria-pressed="false">Phone</button>
              <button data-type="sms" aria-pressed="false">SMS</button>
            </div>
          </div>

          <!-- text -->
          <div class="grp pane" data-pane="text">
            <label class="fl" for="f_text">URL or text</label>
            <textarea id="f_text" class="field" placeholder="https://example.com  or  any text…">https://ctcexport.com</textarea>
          </div>

          <!-- wifi -->
          <div class="grp pane" data-pane="wifi" hidden>
            <div class="grp"><label class="fl" for="w_ssid">Network name (SSID)</label><input id="w_ssid" class="field" placeholder="MyNetwork"></div>
            <div class="grp"><label class="fl" for="w_pass">Password</label><input id="w_pass" class="field" placeholder="••••••••"></div>
            <div class="row grp">
              <div><label class="fl" for="w_enc">Security</label>
                <select id="w_enc" class="field"><option value="WPA">WPA / WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select>
              </div>
              <div><label class="fl" for="w_hidden">Hidden</label>
                <select id="w_hidden" class="field"><option value="false">No</option><option value="true">Yes</option></select>
              </div>
            </div>
          </div>

          <!-- email -->
          <div class="grp pane" data-pane="email" hidden>
            <div class="grp"><label class="fl" for="e_to">To</label><input id="e_to" class="field" placeholder="name@example.com"></div>
            <div class="grp"><label class="fl" for="e_sub">Subject</label><input id="e_sub" class="field" placeholder="Optional"></div>
            <div class="grp"><label class="fl" for="e_body">Message</label><textarea id="e_body" class="field" placeholder="Optional"></textarea></div>
          </div>

          <!-- phone -->
          <div class="grp pane" data-pane="phone" hidden>
            <label class="fl" for="p_num">Phone number</label>
            <input id="p_num" class="field" placeholder="+1 555 010 0199">
          </div>

          <!-- sms -->
          <div class="grp pane" data-pane="sms" hidden>
            <div class="grp"><label class="fl" for="s_num">Phone number</label><input id="s_num" class="field" placeholder="+1 555 010 0199"></div>
            <div class="grp"><label class="fl" for="s_msg">Message</label><textarea id="s_msg" class="field" placeholder="Optional pre-filled text"></textarea></div>
          </div>
        </div>
      </section>

      <!-- 2. STYLE -->
      <section class="panel" id="panel-style" role="tabpanel" aria-labelledby="tab-style" data-tabpanel="style" hidden>
        <div class="pbody">
          <div class="grp">
            <label class="fl">Presets</label>
            <div class="presets" id="presets"></div>
          </div>

          <div class="row grp">
            <div>
              <label class="fl">Module color</label>
              <div class="colorrow">
                <span class="swatch"><span class="sw-fill" id="fgFill"></span><input type="color" id="fgColor" value="#3c0c84"></span>
                <input class="field hex" id="fgHex" value="#3C0C84" maxlength="7">
              </div>
            </div>
            <div>
              <label class="fl">Background</label>
              <div class="colorrow">
                <span class="swatch"><span class="sw-fill" id="bgFill"></span><input type="color" id="bgColor" value="#ffffff"></span>
                <input class="field hex" id="bgHex" value="#FFFFFF" maxlength="7">
              </div>
            </div>
          </div>

          <div class="grp">
            <label class="toggle" for="bgTrans">
              <span><span class="tglab">Transparent background</span><br><span class="tgsub">PNG / SVG only</span></span>
              <span style="position:relative;display:inline-flex"><input type="checkbox" id="bgTrans"><span class="tg"></span></span>
            </label>
          </div>

          <div class="grp">
            <label class="toggle" for="gradOn" style="margin-bottom:10px">
              <span><span class="tglab">Gradient fill</span><br><span class="tgsub">blends module color → second color</span></span>
              <span style="position:relative;display:inline-flex"><input type="checkbox" id="gradOn"><span class="tg"></span></span>
            </label>
            <div id="gradControls" hidden>
              <div class="row">
                <div>
                  <label class="fl">Second color</label>
                  <div class="colorrow">
                    <span class="swatch"><span class="sw-fill" id="fg2Fill"></span><input type="color" id="fg2Color" value="#cc0c24"></span>
                    <input class="field hex" id="fg2Hex" value="#CC0C24" maxlength="7">
                  </div>
                </div>
                <div>
                  <label class="fl">Direction</label>
                  <select id="gradDir" class="field">
                    <option value="diagonal">Diagonal ↘</option>
                    <option value="horizontal">Horizontal →</option>
                    <option value="vertical">Vertical ↓</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div class="grp">
            <label class="fl">Module shape</label>
            <div class="seg" id="shapeSeg" role="group" aria-label="Module shape">
              <button data-shape="square" aria-pressed="true">Square</button>
              <button data-shape="rounded" aria-pressed="false">Rounded</button>
              <button data-shape="dots" aria-pressed="false">Dots</button>
            </div>
          </div>

          <div class="grp">
            <label class="fl">Corner eyes</label>
            <div class="seg" id="eyeSeg" role="group" aria-label="Eye shape">
              <button data-eye="match" aria-pressed="true">Match</button>
              <button data-eye="square" aria-pressed="false">Square</button>
              <button data-eye="rounded" aria-pressed="false">Rounded</button>
            </div>
          </div>

          <div class="grp">
            <label class="fl" for="ecc">Error correction <span style="text-transform:none;letter-spacing:0">— higher survives more damage / logos</span></label>
            <div class="seg" id="eccSeg" role="group" aria-label="Error correction">
              <button data-ecc="L" aria-pressed="false">L · 7%</button>
              <button data-ecc="M" aria-pressed="true">M · 15%</button>
              <button data-ecc="Q" aria-pressed="false">Q · 25%</button>
              <button data-ecc="H" aria-pressed="false">H · 30%</button>
            </div>
          </div>

          <div class="grp">
            <label class="fl">Quiet zone (margin)</label>
            <div class="slider"><input type="range" id="margin" min="0" max="8" step="1" value="4"><span class="sval" id="marginVal">4 mod</span></div>
          </div>

          <div class="grp">
            <label class="fl">Center logo</label>
            <label class="filebtn" for="logoInput">＋ Add image (PNG / JPG / SVG)</label>
            <input type="file" id="logoInput" accept="image/*" hidden>
            <div class="logorow" id="logoRow" hidden>
              <img class="logothumb" id="logoThumb" alt="logo preview">
              <div style="flex:1">
                <div class="slider"><input type="range" id="logoSize" min="12" max="32" step="1" value="22"><span class="sval" id="logoSizeVal">22%</span></div>
              </div>
              <button class="linkbtn" id="logoRemove">remove</button>
            </div>
            <div class="logo-ecc-warn" id="logoEccWarn" hidden>
              <span class="warn-icon">⚠</span> ECC auto-upgraded to <strong>Q</strong> — required for logos to scan reliably.
              <button class="linkbtn" id="logoEccUpgrade" style="margin-left:6px">Upgrade to H instead</button>
            </div>
          </div>

          <div class="grp">
            <label class="fl">Frame</label>
            <div class="frame-grid" id="frameGrid"></div>
            <div id="frameLabelGrp" hidden style="margin-top:14px">
              <label class="fl" for="frameLabel">Frame label text</label>
              <input id="frameLabel" class="field" placeholder="Scan me · Colombian Trading Co." value="Scan to learn more">
              <div class="grp" style="margin-top:10px">
                <label class="fl">Frame color</label>
                <div class="colorrow">
                  <span class="swatch"><span class="sw-fill" id="frameFill"></span><input type="color" id="frameColor" value="#3c0c84"></span>
                  <input class="field hex" id="frameHex" value="#3C0C84" maxlength="7">
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- 3. EXPORT -->
      <section class="panel" id="panel-export" role="tabpanel" aria-labelledby="tab-export" data-tabpanel="export" hidden>
        <div class="pbody">
          <div class="grp">
            <label class="fl" for="fname">File name</label>
            <div style="display:flex;align-items:stretch;gap:0">
              <input id="fname" class="field" value="ctc-qr" style="border-top-right-radius:0;border-bottom-right-radius:0;border-right:none">
              <span id="extLabel" class="field" style="flex:0 0 auto;width:auto;background:var(--paper);color:var(--ink-soft);font-family:var(--mono);font-size:13px;display:grid;place-items:center;border-top-left-radius:0;border-bottom-left-radius:0;padding:0 12px">.png</span>
            </div>
          </div>

          <div class="row grp">
            <div>
              <label class="fl">Format</label>
              <div class="seg" id="fmtSeg" role="group" aria-label="Format">

                <button data-fmt="svg" aria-pressed="false">SVG</button>

          <div class="grp" id="sizeGrp">

            <div class="slider"><input type="range" id="outSize" min="256" max="2048" step="64" value="1024"><span class="sval" id="outSizeVal">1024 px</span></div>
          </div>

          <div class="btnrow">

    <!-- RIGHT: preview -->
    <div class="stage">

        </div>
        <div class="readout" id="readout">
          <span>VER&nbsp;<b id="rVer">—</b></span>
          <span><b id="rMod">—</b>&nbsp;modules</span>

          <span><b id="rBytes">0</b>&nbsp;chars</span>

    </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);

  // ---------- state ----------
  const state = {
    type:'text',
    fg:'#3c0c84', bg:'#ffffff', bgTransparent:false,
    gradient:false, fg2:'#cc0c24', gradDir:'diagonal',
    shape:'square', eye:'match', ecc:'M', margin:4,
    logo:null, logoSize:22,
    frame:'none', frameColor:'#3c0c84', frameLabel:'Scan to learn more',
    fmt:'png', outSize:1024,
  };
  const defaults = JSON.parse(JSON.stringify(state));
  let lastQR = null; // cached matrix info for the readout / failure state

  // ---------- helpers ----------
  function toast(msg){
    const t=$('#toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900);
  }
  function normHex(v){
    v=(v||'').trim(); if(v[0]!=='#') v='#'+v;
    if(/^#[0-9a-fA-F]{3}$/.test(v)) v='#'+v.slice(1).split('').map(c=>c+c).join('');
    return /^#[0-9a-fA-F]{6}$/.test(v) ? v.toLowerCase() : null;
  }
  function sanitizeName(n){
    n=(n||'').trim().replace(/\.[a-z0-9]{1,5}$/i,'').replace(/[^\w\- ]+/g,'').replace(/\s+/g,'-');
    return n || 'ctc-qr';
  }

  // Build the encoded string from the active content type
  function buildContent(){
    switch(state.type){
      case 'text': return $('#f_text').value;
      case 'wifi':{
        const s=$('#w_ssid').value, p=$('#w_pass').value, e=$('#w_enc').value, h=$('#w_hidden').value;
        if(!s) return '';
        const esc=x=>(x||'').replace(/([\\;,:"])/g,'\\$1');
        return `WIFI:T:${e};S:${esc(s)};${e==='nopass'?'':'P:'+esc(p)+';'}H:${h};;`;
      }
      case 'email':{
        const to=$('#e_to').value.trim(); if(!to) return '';
        const q=[]; if($('#e_sub').value) q.push('subject='+encodeURIComponent($('#e_sub').value));
        if($('#e_body').value) q.push('body='+encodeURIComponent($('#e_body').value));
        return 'mailto:'+to+(q.length?'?'+q.join('&'):'');
      }
      case 'phone':{ const n=$('#p_num').value.replace(/[^\d+]/g,''); return n?'tel:'+n:''; }
      case 'sms':{
        const n=$('#s_num').value.replace(/[^\d+]/g,''); if(!n) return '';
        const m=$('#s_msg').value; return 'SMSTO:'+n+':'+m;
      }
    }
    return '';
  }

  // Adapter around the embedded engine: returns a normalized QR object
  // with { n, version, isDark(r,c) }.  Throws on empty / too-long data.
  const _ecMap = {L:'L', M:'M', Q:'Q', H:'H'};
  function makeQR(text, ecc){
    const holder = document.createElement('div');
    const q = new QRCode(holder, {text:text, width:1, height:1, correctLevel: QRCode.CorrectLevel[_ecMap[ecc]||'M']});
    const model = q._oQRCode;
    const n = model.getModuleCount();
    return { n:n, version: model.typeNumber, isDark:(r,c)=>model.isDark(r,c),
             modules:{ size:n } };
  }

  // Detect whether a module (r,c) belongs to one of the three finder "eyes"
  function inEye(r,c,n){
    const a = r<7 && c<7;
    const b = r<7 && c>=n-7;
    const d = r>=n-7 && c<7;
    return a||b||d;
  }

  function fillStyleFor(ctx,x,y,w,h){
    if(!state.gradient) return state.fg;
    let g;
    if(state.gradDir==='horizontal') g=ctx.createLinearGradient(x,0,x+w,0);
    else if(state.gradDir==='vertical') g=ctx.createLinearGradient(0,y,0,y+h);
    else g=ctx.createLinearGradient(x,y,x+w,y+h);
    g.addColorStop(0,state.fg); g.addColorStop(1,state.fg2);
    return g;
  }

  function roundRectPath(ctx,x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // Draw the whole code onto a canvas at the requested pixel size
  function renderCanvas(canvas, pixelSize, forExport){
    const text = buildContent();
    const empty = $('#empty');
    if(!text){
      canvas.style.display='none'; empty.hidden=false; lastQR=null; updateReadout(null,0);
      return false;
    }
    let qr;
    try{ qr = makeQR(text, state.ecc); }
    catch(err){
      canvas.style.display='none'; empty.hidden=false;
      empty.className='err'; empty.textContent='Too much data for one QR code — shorten the content or lower the error correction.';
      lastQR=null; updateReadout(null,text.length);
      return false;
    }
    empty.hidden=true; empty.className='empty'; canvas.style.display='block';

    const n = qr.n;
    const isDark = qr.isDark;
    const m = state.margin;
    const total = n + m*2;
    const cell = Math.floor(pixelSize/total);
    const dim = cell*total;
    canvas.width=dim; canvas.height=dim;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,dim,dim);

    // background
    const transparent = state.bgTransparent && forExport!=='jpg';
    if(!transparent){ ctx.fillStyle=state.bg; ctx.fillRect(0,0,dim,dim); }
    else if(forExport==='jpg'){ ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,dim,dim); }

    const off = m*cell;
    const eyeStyle = state.eye==='match' ? state.shape : state.eye; // square|rounded|dots-> but eyes only square/rounded
    const customEyes = (state.eye==='rounded') || (state.eye==='match' && (state.shape==='rounded'||state.shape==='dots'));

    // modules (skip eye area if drawing custom eyes)
    for(let r=0;r<n;r++){
      for(let c=0;c<n;c++){
        if(!isDark(r,c)) continue;
        if(customEyes && inEye(r,c,n)) continue;
        const x=off+c*cell, y=off+r*cell;
        ctx.fillStyle=fillStyleFor(ctx,x,y,cell,cell);
        if(state.shape==='dots'){
          ctx.beginPath(); ctx.arc(x+cell/2,y+cell/2,cell*0.46,0,Math.PI*2); ctx.fill();
        }else if(state.shape==='rounded'){
          roundRectPath(ctx,x+cell*0.06,y+cell*0.06,cell*0.88,cell*0.88,cell*0.34); ctx.fill();
        }else{
          ctx.fillRect(x,y,cell+0.5,cell+0.5);
        }
      }
    }

    // custom finder eyes
    if(customEyes){
      const eyes=[[0,0],[0,n-7],[n-7,0]];
      const rounded = state.eye!=='square';
      eyes.forEach(([er,ec])=>{
        const x=off+ec*cell, y=off+er*cell, s=7*cell;
        ctx.fillStyle=fillStyleFor(ctx,x,y,s,s);
        // outer ring
        const oR = rounded? s*0.28 : 0;
        roundRectPath(ctx,x,y,s,s,oR); 
        // inner cutout
        roundRectPath(ctx,x+cell,y+cell,s-2*cell,s-2*cell, rounded? (s-2*cell)*0.26:0);
        ctx.fill('evenodd');
        // center dot
        const ix=x+2*cell, iy=y+2*cell, is=3*cell;
        ctx.fillStyle=fillStyleFor(ctx,ix,iy,is,is);
        roundRectPath(ctx,ix,iy,is,is, rounded? is*0.28:0); ctx.fill();
      });
    }

    // logo
    if(state.logo){
      const lp = state.logoSize/100;
      const qDim = n*cell;
      const lsize = Math.round(qDim*lp);
      const lx = off + Math.round((qDim-lsize)/2);
      const ly = off + Math.round((qDim-lsize)/2);
      const pad = Math.round(lsize*0.10);
      ctx.fillStyle = transparent ? '#ffffff' : state.bg;
      roundRectPath(ctx,lx-pad,ly-pad,lsize+pad*2,lsize+pad*2,(lsize+pad*2)*0.18); ctx.fill();
      try{ ctx.drawImage(state.logo,lx,ly,lsize,lsize); }catch(e){}
    }

    lastQR={qr,n}; updateReadout(qr,text.length);
    return true;
  }

  function updateReadout(qr,chars){
    $('#rVer').textContent = qr? qr.version : '—';
    $('#rMod').textContent = qr? (qr.modules.size+'×'+qr.modules.size) : '—';
    $('#rEcc').textContent = state.ecc;
    $('#rBytes').textContent = chars;
  }

  // ---------- SVG builder (for SVG export) ----------
  function buildSVG(){
    if(!lastQR) return null;
    const {qr,n}=lastQR, m=state.margin, total=n+m*2;
    const unit=10; const dim=total*unit; const off=m*unit;
    const customEyes=(state.eye==='rounded')||(state.eye==='match'&&(state.shape==='rounded'||state.shape==='dots'));
    let defs='', fg=state.fg;
    if(state.gradient){
      const dir=state.gradDir;
      const coords = dir==='horizontal'?'x1="0" y1="0" x2="1" y2="0"':dir==='vertical'?'x1="0" y1="0" x2="0" y2="1"':'x1="0" y1="0" x2="1" y2="1"';
      defs=`<defs><linearGradient id="g" ${coords}><stop offset="0" stop-color="${state.fg}"/><stop offset="1" stop-color="${state.fg2}"/></linearGradient></defs>`;
      fg='url(#g)';
    }
    let body='';
    if(!state.bgTransparent) body+=`<rect width="${dim}" height="${dim}" fill="${state.bg}"/>`;
    for(let r=0;r<n;r++)for(let c=0;c<n;c++){
      if(!qr.isDark(r,c)) continue;
      if(customEyes && inEye(r,c,n)) continue;
      const x=off+c*unit, y=off+r*unit;
      if(state.shape==='dots') body+=`<circle cx="${x+unit/2}" cy="${y+unit/2}" r="${unit*0.46}" fill="${fg}"/>`;
      else if(state.shape==='rounded') body+=`<rect x="${x+unit*0.06}" y="${y+unit*0.06}" width="${unit*0.88}" height="${unit*0.88}" rx="${unit*0.34}" fill="${fg}"/>`;
      else body+=`<rect x="${x}" y="${y}" width="${unit}" height="${unit}" fill="${fg}"/>`;
    }
    if(customEyes){
      const rounded=state.eye!=='square';
      [[0,0],[0,n-7],[n-7,0]].forEach(([er,ec])=>{
        const x=off+ec*unit,y=off+er*unit,s=7*unit;
        const oR=rounded?s*0.28:0, iR=rounded?(3*unit)*0.28:0, mR=rounded?(5*unit)*0.26:0;
        body+=`<path fill="${fg}" fill-rule="evenodd" d="${rr(x,y,s,s,oR)} ${rr(x+unit,y+unit,s-2*unit,s-2*unit,mR)}"/>`;
        body+=`<rect x="${x+2*unit}" y="${y+2*unit}" width="${3*unit}" height="${3*unit}" rx="${iR}" fill="${fg}"/>`;
      });
    }
    if(state.logo && state.logoDataURL){
      const lp=state.logoSize/100, qd=n*unit, ls=qd*lp, lx=off+(qd-ls)/2, ly=off+(qd-ls)/2, pad=ls*0.10;
      body+=`<rect x="${lx-pad}" y="${ly-pad}" width="${ls+pad*2}" height="${ls+pad*2}" rx="${(ls+pad*2)*0.18}" fill="${state.bgTransparent?'#ffffff':state.bg}"/>`;
      body+=`<image href="${state.logoDataURL}" x="${lx}" y="${ly}" width="${ls}" height="${ls}"/>`;
    }
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${dim}" height="${dim}" viewBox="0 0 ${dim} ${dim}" shape-rendering="crispEdges">${defs}${body}</svg>`;
    function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);return `M${x+r},${y} h${w-2*r} a${r},${r} 0 0 1 ${r},${r} v${h-2*r} a${r},${r} 0 0 1 ${-r},${r} h${-(w-2*r)} a${r},${r} 0 0 1 ${-r},${-r} v${-(h-2*r)} a${r},${r} 0 0 1 ${r},${-r} z`;}
  }

  // ---------- frame canvas painter ----------
  // Returns total canvas size given qr canvas size
  const FRAME_PAD = 28; // px padding inside frame (each side) at 1024px export
  const FRAME_LABEL_H = 52; // px label bar height at 1024px

  function applyFrameCanvas(ctx, qSize, isExport){
    if(state.frame==='none') return;
    const sc = isExport ? 1 : qSize/1024; // scale factor for preview
    const pad = Math.round(FRAME_PAD*sc);
    const labelH = Math.round(FRAME_LABEL_H*sc);
    const fc = state.frameColor;
    const lw = Math.max(2, Math.round(8*sc));
    const r = Math.round(28*sc); // corner radius for rounded frames
    const W = ctx.canvas.width, H = ctx.canvas.height;

    ctx.save();
    ctx.strokeStyle=fc; ctx.fillStyle=fc; ctx.lineWidth=lw;

    function rrPath(x,y,w,h,cr){
      cr=Math.min(cr,w/2,h/2);
      ctx.beginPath();
      ctx.moveTo(x+cr,y); ctx.arcTo(x+w,y,x+w,y+h,cr); ctx.arcTo(x+w,y+h,x,y+h,cr);
      ctx.arcTo(x,y+h,x,y,cr); ctx.arcTo(x,y,x+w,y,cr); ctx.closePath();
    }

    const hasLabel=['banner','badge','label-t','speech'].includes(state.frame);
    // label font
    const fs = Math.max(10, Math.round(22*sc));
    ctx.font=`600 ${fs}px "Space Grotesk",system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';

    switch(state.frame){
      case 'simple':
        rrPath(lw/2,lw/2,W-lw,H-lw,0); ctx.stroke(); break;
      case 'rounded':
        rrPath(lw/2,lw/2,W-lw,H-lw,r); ctx.stroke(); break;
      case 'banner':{
        rrPath(lw/2,lw/2,W-lw,H-lw,0); ctx.stroke();
        ctx.fillRect(lw/2, H-labelH, W-lw, labelH);
        ctx.fillStyle='#fff';
        ctx.fillText(state.frameLabel||'Scan me', W/2, H-labelH/2, W-pad*2);
        break;
      }
      case 'badge':{
        rrPath(lw/2,lw/2,W-lw,H-lw,r); ctx.stroke();
        ctx.save(); rrPath(lw/2,H-labelH,W-lw,labelH,r); ctx.clip();
        ctx.fillRect(0,H-labelH,W,labelH); ctx.restore();
        ctx.fillStyle='#fff';
        ctx.fillText(state.frameLabel||'Scan me', W/2, H-labelH/2, W-pad*2);
        break;
      }
      case 'label-t':{
        rrPath(lw/2,lw/2,W-lw,H-lw,0); ctx.stroke();
        ctx.fillRect(lw/2, lw/2, W-lw, labelH);
        ctx.fillStyle='#fff';
        ctx.fillText(state.frameLabel||'Scan me', W/2, lw/2+labelH/2, W-pad*2);
        break;
      }
      case 'speech':{
        const tailH=Math.round(28*sc), bodyH=H-tailH;
        rrPath(lw/2,lw/2,W-lw,bodyH-lw/2,r); ctx.stroke();
        // speech tail
        ctx.beginPath();
        const tx=W*0.25;
        ctx.moveTo(tx,bodyH); ctx.lineTo(tx+Math.round(30*sc),bodyH); ctx.lineTo(tx+Math.round(15*sc),H); ctx.closePath();
        ctx.fillStyle=fc; ctx.fill();
        ctx.fillStyle=fc;
        ctx.fillText(state.frameLabel||'Scan me', W/2, bodyH-labelH/2, W-pad*2);
        // redraw top label bar inside bubble
        ctx.fillStyle=fc;
        ctx.fillRect(lw/2+1,lw/2+1,W-lw-2,labelH);
        ctx.fillStyle='#fff';
        ctx.fillText(state.frameLabel||'Scan me', W/2, lw/2+1+labelH/2, W-pad*2);
        break;
      }
      case 'corner':{
        const arm=Math.round(60*sc);
        ctx.lineWidth=lw; ctx.lineCap='round';
        [[0,0,1,0,0,1],[W,0,-1,0,0,1],[W,H,-1,0,0,-1],[0,H,1,0,0,-1]].forEach(([ox,oy,dx,dy,ex,ey])=>{
          ctx.beginPath(); ctx.moveTo(ox+dx*arm,oy+dy*lw/2); ctx.lineTo(ox+dx*lw/2,oy+dy*lw/2); ctx.lineTo(ox+ex*lw/2,oy+ey*arm); ctx.stroke();
        });
        break;
      }
      case 'circle':{
        ctx.beginPath(); ctx.arc(W/2,H/2,W/2-lw/2-1,0,Math.PI*2); ctx.stroke(); break;
      }
      case 'stamp':{
        const rOuter=W/2-lw/2-2, dotR=Math.max(3,Math.round(8*sc));
        const dots=16;
        for(let i=0;i<dots;i++){
          const a=i*2*Math.PI/dots;
          ctx.beginPath(); ctx.arc(W/2+rOuter*Math.cos(a),H/2+rOuter*Math.sin(a),dotR,0,Math.PI*2); ctx.fill();
        }
        ctx.beginPath(); ctx.arc(W/2,H/2,rOuter-dotR*2-lw,0,Math.PI*2); ctx.stroke();
        break;
      }
    }
    ctx.restore();
  }

  // Wrap renderCanvas to composite frame on top
  const _origRenderCanvas = renderCanvas;
  function renderCanvasWithFrame(canvas, pixelSize, forExport){
    // For frames that need extra vertical space, expand canvas before QR render
    const needsExpansion = state.frame!=='none' && ['banner','badge','label-t','speech'].includes(state.frame);
    const sc = forExport? pixelSize/1024 : pixelSize/1024;
    const labelH = needsExpansion ? Math.round(FRAME_LABEL_H*(pixelSize/1024)) : 0;
    const framePad = state.frame!=='none' ? Math.round(FRAME_PAD*(pixelSize/1024)) : 0;
    const isTopLabel = state.frame==='label-t';

    // Compute inner QR size
    const innerSize = pixelSize - framePad*2 - (needsExpansion ? labelH : 0);
    // Render QR into a temp canvas
    const tmp=document.createElement('canvas');
    const ok = _origRenderCanvas(tmp, innerSize, forExport);
    if(!ok){ canvas.style.display='none'; return false; }

    if(state.frame==='none'){
      canvas.width=tmp.width; canvas.height=tmp.height;
      canvas.getContext('2d').drawImage(tmp,0,0);
      canvas.style.display='block';
      return true;
    }

    // Build full canvas with frame padding
    const totalW = tmp.width + framePad*2;
    const totalH = tmp.height + framePad*2 + labelH;
    canvas.width=totalW; canvas.height=totalH;
    const ctx=canvas.getContext('2d');

    // Fill background
    const transparent = state.bgTransparent && forExport!=='jpg';
    if(!transparent){ ctx.fillStyle=state.bg; ctx.fillRect(0,0,totalW,totalH); }
    else if(forExport==='jpg'){ ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,totalW,totalH); }

    // Place QR
    const qrY = isTopLabel ? framePad+labelH : framePad;
    ctx.drawImage(tmp, framePad, qrY);

    // Draw frame decoration
    applyFrameCanvas(ctx, pixelSize, forExport!==false);
    canvas.style.display='block';
    return true;
  }

  function refresh(){ renderCanvasWithFrame($('#preview'), 600, false); }

  // Override exportFile to use frame-aware render
  function exportFile(){
    if(!lastQR){ toast('Nothing to export yet'); return; }
    const name=sanitizeName($('#fname').value);
    if(state.fmt==='svg'){
      const svg=buildSVG(); if(!svg){toast('Nothing to export');return;}
      downloadBlob(new Blob([svg],{type:'image/svg+xml'}), name+'.svg');
      toast('Saved '+name+'.svg'); return;
    }
    const c=document.createElement('canvas');
    if(!renderCanvasWithFrame(c, state.outSize, state.fmt)){ toast('Nothing to export'); return; }
    const mime = state.fmt==='jpg'?'image/jpeg':'image/png';
    c.toBlob(b=>{ downloadBlob(b,name+'.'+state.fmt); toast('Saved '+name+'.'+state.fmt); }, mime, 0.92);
  }
  async function copyImage(){
    if(!lastQR){ toast('Nothing to copy'); return; }
    const c=document.createElement('canvas');
    if(!renderCanvasWithFrame(c, Math.min(state.outSize,1024), 'png')){ return; }
    try{
      const blob=await new Promise(res=>c.toBlob(res,'image/png'));
      await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
      toast('Copied to clipboard');
    }catch(e){ toast('Copy not supported — use Download'); }
  }

  // ---------- tabs ----------
  const tabBtns = [...document.querySelectorAll('.tab')];
  function selectTab(name, focus){
    tabBtns.forEach(b=>{
      const on = b.dataset.tab===name;
      b.setAttribute('aria-selected', on?'true':'false');
      b.tabIndex = on?0:-1;
      if(on && focus) b.focus();
    });
    document.querySelectorAll('[data-tabpanel]').forEach(p=>{ p.hidden = p.dataset.tabpanel!==name; });
  }
  tabBtns.forEach((b,i)=>{
    b.addEventListener('click',()=>selectTab(b.dataset.tab));
    b.addEventListener('keydown',e=>{
      if(e.key!=='ArrowRight' && e.key!=='ArrowLeft') return;
      e.preventDefault();
      const dir = e.key==='ArrowRight'?1:-1;
      const next = (i+dir+tabBtns.length)%tabBtns.length;
      selectTab(tabBtns[next].dataset.tab, true);
    });
  });

  // ready check for library, then first render
  function start(){
    if(typeof QRCode==='undefined' || !QRCode.CorrectLevel){
      $('#empty').hidden=false; $('#empty').className='err';
      $('#empty').textContent='The QR engine failed to initialize. Please reload the page.';
      $('#preview').style.display='none'; return;
    }
    refresh();
  }
  if(document.readyState!=='loading') start(); else window.addEventListener('DOMContentLoaded',start);
})();
</script>
</body>
</html>
